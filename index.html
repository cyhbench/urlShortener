<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URL Shortener v1.2</title>
<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #f0f2f5;
  color: #222;
  min-height: 100vh;
}
.container { max-width: 560px; margin: 0 auto; padding: 20px 16px; }
h1 { text-align: center; font-size: 24px; color: #1a1a2e; margin: 20px 0 8px; }
.subtitle { text-align: center; color: #888; font-size: 14px; margin-bottom: 24px; }
.input-row { display: flex; gap: 8px; margin-bottom: 12px; }
#urlInput {
  flex: 1; padding: 14px; border: 2px solid #ddd; border-radius: 8px;
  font-size: 15px; outline: none; background: #fff; color: #222;
}
#urlInput:focus { border-color: #1976d2; }
#goBtn {
  padding: 14px 28px; background: #1976d2; color: #fff; border: none;
  border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer;
}
#goBtn:hover { background: #1565c0; }
#goBtn:disabled { background: #bbb; cursor: not-allowed; }
#results { margin-top: 20px; }
.card { background: #fff; border: 1px solid #ddd; border-radius: 10px; padding: 14px; margin-bottom: 12px; }
.card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.card-service { font-weight: 600; font-size: 14px; color: #333; }
.badge { font-size: 11px; padding: 2px 10px; border-radius: 12px; }
.badge-loading { background: #f0f0f0; color: #888; }
.badge-ok { background: #e8f5e9; color: #2e7d32; }
.badge-fail { background: #fff3e0; color: #e65100; }
.card-url { display: flex; gap: 8px; align-items: center; }
.card-url a.short-link {
  flex: 1; display: block; padding: 10px; background: #f5f5f5;
  border-radius: 6px; color: #1976d2; font-size: 14px; word-break: break-all; text-decoration: none;
}
.btn-sm { padding: 8px 12px; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; white-space: nowrap; }
.btn-copy { background: #e0e0e0; color: #333; }
.btn-open { background: #e3f2fd; color: #1976d2; border: 1px solid #1976d2; text-decoration: none; display: inline-block; }
#historySection { margin-top: 32px; }
#historySection h2 { font-size: 14px; color: #888; margin: 0 0 10px; font-weight: 600; letter-spacing: 0.5px; }
.history-list { display: flex; flex-direction: column; gap: 6px; }
.history-item {
  display: flex; align-items: center; gap: 8px; background: #fff;
  border: 1px solid #e8e8e8; border-radius: 8px; padding: 8px 12px; cursor: pointer;
  font-size: 13px; color: #1976d2; word-break: break-all; text-align: left; width: 100%;
}
.history-item:hover { background: #f0f7ff; border-color: #1976d2; }
.history-time { flex-shrink: 0; color: #bbb; font-size: 11px; }
.history-clear { margin-top: 10px; background: none; border: none; color: #bbb; font-size: 12px; cursor: pointer; padding: 0; }
.history-clear:hover { color: #e53935; }
@media (min-width: 768px) { .container { padding-top: 40px; } }
</style>
</head>
<body>
<div class="container">
  <h1>🔗 URL Shortener <small style="font-size:12px;color:#888">v1.2</small></h1>
  <p class="subtitle">貼上網址，一鍵產生多個縮網址</p>
  <div class="input-row">
    <input type="text" id="urlInput" placeholder="貼上網址（不限 https 開頭）..."
      autocorrect="off" autocapitalize="off" spellcheck="false">
    <button id="goBtn">縮短</button>
  </div>
  <div id="results"></div>
  <div id="historySection" style="display:none;">
    <h2>最近記錄</h2>
    <div class="history-list" id="historyList"></div>
    <button class="history-clear" id="historyClear">清除記錄</button>
  </div>
</div>
<script>
const SERVICES = [
  { name: 'TinyURL', api: (u) => 'https://tinyurl.com/api-create.php?url=' + encodeURIComponent(u) },
  { name: 'is.gd',   api: (u) => 'https://is.gd/create.php?format=simple&url=' + encodeURIComponent(u) },
  { name: 'v.gd',    api: (u) => 'https://v.gd/create.php?format=simple&url=' + encodeURIComponent(u) },
  { name: 'Bit.ly',  open: (u) => 'https://bitly.com/a/shorten-url/?url=' + encodeURIComponent(u) },
  { name: 'Short.io', open: (u) => 'https://short.io/shorten/?url=' + encodeURIComponent(u) },
  { name: 'Dub.co',  open: (u) => 'https://dub.co/?url=' + encodeURIComponent(u) },
];
const HISTORY_KEY = 'urlShortener_history';
const HISTORY_MAX = 20;

function createShortUrlRow(shortUrl) {
  const wrap = document.createElement('div');
  wrap.className = 'card-url';
  const a = document.createElement('a');
  a.href = shortUrl;
  a.className = 'short-link';
  a.textContent = shortUrl;
  a.target = '_blank';
  a.rel = 'noopener noreferrer';
  const btn = document.createElement('button');
  btn.className = 'btn-sm btn-copy';
  btn.textContent = '複製';
  btn.addEventListener('click', () => copyUrl(shortUrl, btn));
  wrap.appendChild(a);
  wrap.appendChild(btn);
  return wrap;
}

function createOpenLinkRow(href, serviceName) {
  const wrap = document.createElement('div');
  wrap.className = 'card-url';
  const a = document.createElement('a');
  a.href = href;
  a.className = 'btn-sm btn-open';
  a.textContent = '開啟 ' + serviceName + ' →';
  a.target = '_blank';
  a.rel = 'noopener noreferrer';
  wrap.appendChild(a);
  return wrap;
}

function go() {
  let url = document.getElementById('urlInput').value.trim();
  if (!url) return;
  if (!/^https?:\/\//.test(url)) url = 'https://' + url;
  const goBtn = document.getElementById('goBtn');
  goBtn.disabled = true;
  goBtn.textContent = '處理中...';
  const box = document.getElementById('results');
  box.innerHTML = '';
  const fetchPromises = [];
  SERVICES.forEach(s => {
    const card = document.createElement('div');
    card.className = 'card';
    const top = document.createElement('div');
    top.className = 'card-top';
    const svcSpan = document.createElement('span');
    svcSpan.className = 'card-service';
    svcSpan.textContent = s.name;
    const badge = document.createElement('span');
    badge.className = 'badge badge-loading';
    badge.textContent = '等待中';
    top.appendChild(svcSpan);
    top.appendChild(badge);
    const urlDiv = document.createElement('div');
    urlDiv.className = 'card-url';
    urlDiv.textContent = '-';
    card.appendChild(top);
    card.appendChild(urlDiv);
    box.appendChild(card);
    if (s.api) {
      badge.textContent = '產生中...';
      const p = fetch(s.api(url), { method: 'GET', signal: AbortSignal.timeout(8000) })
        .then(r => r.text())
        .then(text => {
          const short = text.trim();
          if (!short.startsWith('http')) throw new Error('invalid response');
          badge.textContent = '完成';
          badge.className = 'badge badge-ok';
          urlDiv.replaceWith(createShortUrlRow(short));
          saveHistory(url);
        })
        .catch(() => {
          badge.textContent = '需手動';
          badge.className = 'badge badge-fail';
          if (s.open) urlDiv.replaceWith(createOpenLinkRow(s.open(url), s.name));
        });
      fetchPromises.push(p);
    } else {
      badge.textContent = '手動';
      badge.className = 'badge badge-fail';
      urlDiv.replaceWith(createOpenLinkRow(s.open(url), s.name));
    }
  });
  Promise.allSettled(fetchPromises).then(() => {
    goBtn.disabled = false;
    goBtn.textContent = '縮短';
    renderHistory();
  });
}

function copyUrl(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '已複製!';
    setTimeout(() => { btn.textContent = '複製'; }, 1500);
  });
}

function loadHistory() {
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); }
  catch { return []; }
}

function saveHistory(url) {
  const list = loadHistory().filter(item => item.url !== url);
  list.unshift({ url, ts: Date.now() });
  try { localStorage.setItem(HISTORY_KEY, JSON.stringify(list.slice(0, HISTORY_MAX))); }
  catch {}
}

function renderHistory() {
  const list = loadHistory();
  const section = document.getElementById('historySection');
  const container = document.getElementById('historyList');
  if (!list.length) { section.style.display = 'none'; return; }
  section.style.display = '';
  container.innerHTML = '';
  list.forEach(item => {
    const row = document.createElement('button');
    row.className = 'history-item';
    row.addEventListener('click', () => {
      document.getElementById('urlInput').value = item.url;
      go();
    });
    const urlSpan = document.createElement('span');
    urlSpan.style.flex = '1';
    urlSpan.textContent = item.url;
    const timeSpan = document.createElement('span');
    timeSpan.className = 'history-time';
    timeSpan.textContent = formatTs(item.ts);
    row.appendChild(urlSpan);
    row.appendChild(timeSpan);
    container.appendChild(row);
  });
}

function formatTs(ts) {
  const diff = Date.now() - ts;
  if (diff < 60000) return '剛才';
  if (diff < 3600000) return Math.floor(diff / 60000) + ' 分前';
  if (diff < 86400000) return Math.floor(diff / 3600000) + ' 時前';
  return Math.floor(diff / 86400000) + ' 天前';
}

document.getElementById('historyClear').addEventListener('click', () => {
  try { localStorage.removeItem(HISTORY_KEY); } catch {}
  renderHistory();
});
document.getElementById('goBtn').addEventListener('click', go);
document.getElementById('urlInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') go();
});
renderHistory();
</script>
</body>
</html>
