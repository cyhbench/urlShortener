<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URL Shortener</title>
<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #f0f2f5;
  color: #222;
  min-height: 100vh;
}

.container {
  max-width: 560px;
  margin: 0 auto;
  padding: 20px 16px;
}

h1 {
  text-align: center;
  font-size: 24px;
  color: #1a1a2e;
  margin: 20px 0 8px;
}

.subtitle {
  text-align: center;
  color: #888;
  font-size: 14px;
  margin-bottom: 24px;
}

.input-row {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}

#urlInput {
  flex: 1;
  padding: 14px;
  border: 2px solid #ddd;
  border-radius: 8px;
  font-size: 15px;
  outline: none;
  background: #fff;
  color: #222;
}
#urlInput:focus { border-color: #1976d2; }

#goBtn {
  padding: 14px 28px;
  background: #1976d2;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
}
#goBtn:hover { background: #1565c0; }
#goBtn:disabled { background: #bbb; }

#results {
  margin-top: 20px;
}

.card {
  background: #fff;
  border: 1px solid #ddd;
  border-radius: 10px;
  padding: 14px;
  margin-bottom: 12px;
}

.card-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.card-service {
  font-weight: 600;
  font-size: 14px;
  color: #333;
}

.badge {
  font-size: 11px;
  padding: 2px 10px;
  border-radius: 12px;
}
.badge-loading { background: #f0f0f0; color: #888; }
.badge-ok { background: #e8f5e9; color: #2e7d32; }
.badge-fail { background: #fff3e0; color: #e65100; }

.card-url {
  display: flex;
  gap: 8px;
  align-items: center;
}

.card-url a {
  flex: 1;
  display: block;
  padding: 10px;
  background: #f5f5f5;
  border-radius: 6px;
  color: #1976d2;
  font-size: 14px;
  word-break: break-all;
  text-decoration: none;
}

.btn-sm {
  padding: 8px 12px;
  border: none;
  border-radius: 6px;
  font-size: 13px;
  cursor: pointer;
  white-space: nowrap;
}

.btn-copy {
  background: #e0e0e0;
  color: #333;
}

.btn-open {
  background: #e3f2fd;
  color: #1976d2;
  border: 1px solid #1976d2;
  text-decoration: none;
}

@media (min-width: 768px) {
  .container { padding-top: 40px; }
}
</style>
</head>
<body>

<div class="container">
  <h1>🔗 URL Shortener</h1>
  <p class="subtitle">貼上網址，一鍵產生多個縮網址</p>

  <div class="input-row">
    <input type="text" id="urlInput" placeholder="貼上網址（不限 https 開頭）...">
    <button id="goBtn" onclick="go()">縮短</button>
  </div>

  <div id="results"></div>
</div>

<script>
const SERVICES = [
  { name: 'TinyURL', api: (u) => `https://tinyurl.com/api-create.php?url=${encodeURIComponent(u)}` },
  { name: 'is.gd', api: (u) => `https://is.gd/create.php?format=simple&url=${encodeURIComponent(u)}` },
  { name: 'v.gd', api: (u) => `https://v.gd/create.php?format=simple&url=${encodeURIComponent(u)}` },
  { name: 'Bit.ly', open: (u) => `https://bitly.com/a/shorten-url/?url=${encodeURIComponent(u)}` },
  { name: 'Short.io', open: (u) => `https://short.io/shorten/?url=${encodeURIComponent(u)}` },
  { name: 'Dub.co', open: (u) => `https://dub.co/?url=${encodeURIComponent(u)}` },
];

function go() {
  let url = document.getElementById('urlInput').value.trim();
  if (!url) return;
  if (!/^https?:\/\//.test(url)) url = 'https://' + url;

  const btn = document.getElementById('goBtn');
  btn.disabled = true;
  btn.textContent = '處理中...';

  const box = document.getElementById('results');
  box.innerHTML = '';

  SERVICES.forEach(s => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-top">
        <span class="card-service">${s.name}</span>
        <span class="badge badge-loading">等待中</span>
      </div>
      <div class="card-url">-</div>
    `;
    box.appendChild(card);

    if (s.api) {
      // Try direct API
      const badge = card.querySelector('.badge');
      const urlDiv = card.querySelector('.card-url');
      badge.textContent = '產生中...';

      fetch(s.api(url), { method: 'GET', signal: AbortSignal.timeout(8000) })
        .then(r => r.text())
        .then(text => {
          const short = text.trim();
          if (short.startsWith('http')) {
            badge.textContent = '完成';
            badge.className = 'badge badge-ok';
            urlDiv.innerHTML = `
              <a href="${short}" target="_blank">${short}</a>
              <button class="btn-sm btn-copy" onclick="copyUrl('${short}', this)">複製</button>
            `;
          } else throw new Error('bad');
        })
        .catch(() => {
          badge.textContent = '需手動';
          badge.className = 'badge badge-fail';
          urlDiv.innerHTML = `<a class="btn-sm btn-open" href="${s.open(url)}" target="_blank">開啟 ${s.name} →</a>`;
        });
    } else {
      // Manual only
      const badge = card.querySelector('.badge');
      const urlDiv = card.querySelector('.card-url');
      badge.textContent = '手動';
      badge.className = 'badge badge-fail';
      urlDiv.innerHTML = `<a class="btn-sm btn-open" href="${s.open(url)}" target="_blank">開啟 ${s.name} →</a>`;
    }
  });

  Promise.allSettled([]).then(() => {
    btn.disabled = false;
    btn.textContent = '縮短';
  });
}

function copyUrl(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '已複製!';
    setTimeout(() => btn.textContent = '複製', 1500);
  });
}

document.getElementById('urlInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') go();
});
</script>
</body>
</html>
